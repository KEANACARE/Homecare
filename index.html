<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keana's Home Care</title>
<style>
/* Exact Colors from your Logo */
:root {
--navy-blue: #2c3e50;
--white: #ffffff;
--light-gray: #f4f4f4;
}

body { margin: 0; font-family: 'Arial', sans-serif; background-color: #fff; }

/* Top Bar with Logo and Contacts */
.top-header {
background-color: var(--navy-blue);
color: white;
padding: 20px 5%;
display: flex;
justify-content: space-between;
align-items: center;
}

.logo-box {
background: white;
padding: 10px;
border-radius: 5px;
/* Replace 'logo.jpg' with your actual logo filename later */
width: 150px;
text-align: center;
}

.contact-details {
text-align: right;
font-size: 0.9rem;
line-height: 1.5;
}

/* The Menu Bar */
nav {
background-color: #34495e; /* Slightly lighter navy for the menu */
padding: 10px 5%;
border-top: 1px solid rgba(255,255,255,0.1);
}

nav a {
color: white;
text-decoration: none;
margin-right: 20px;
font-weight: bold;
font-size: 0.85rem;
text-transform: uppercase;
}

nav a:hover {
color: #bdc3c7;
}
</style>
</head>
<body>

<!-- Section 1: Top Branding -->
<div class="top-header">
<div class="logo-box">
<!-- This is a placeholder until you add your logo image file -->
<span style="color: var(--navy-blue); font-weight: bold;">KEANA'S LOGO</span>
</div>

<div class="contact-details">
<div><strong>Tel No:</strong> YOUR_PHONE_HERE</div>
<div><strong>Email:</strong> (ZOHO EMAIL PENDING)</div>
<div><strong>Location:</strong> Serving UK Nationwide</div>
</div>
</div>

<!-- Section 2: Navigation Menu -->
<nav>
<a href="#">Home</a>
<a href="#">About Us</a>
<a href="#">Services</a>
<a href="#">Our Staff</a>
<a href="#">FAQs</a>
<a href="#">Careers</a>
<a href="#">Contact Us</a>
</nav>

<!-- Section 3: Hero Section with Circle Text -->
<div style="
position: relative;
height: 500px;
background: url('https://images.unsplash.com/photo-1576765608535-5f04d1e3f289?auto=format&fit=crop&w=1350&q=80');
background-size: cover;
background-position: center;
display: flex;
align-items: center;
justify-content: center;">

<!-- The Purple/Navy Circle (Restoration Style) -->
<div style="
background-color: rgba(44, 62, 80, 0.9); /* Your Logo Navy Blue */
color: white;
width: 350px;
height: 350px;
border-radius: 50%;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
border: 5px solid white;
box-shadow: 0 0 20px rgba(0,0,0,0.3);
z-index: 10;">

<h2 style="margin: 0; font-size: 1.8rem; text-transform: uppercase;">Keana's Home Care</h2>
<hr style="width: 50%; border: 1px solid white; margin: 15px 0;">
<p style="font-size: 1rem; margin: 0; line-height: 1.4;">
Our service offers a person-centered therapeutic approach based on wellness and compassionate support.
</p>
</div>
</div>
</body>
</html>
